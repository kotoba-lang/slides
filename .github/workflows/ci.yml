name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install npm dependencies
        run: npm ci
      - name: Test CLJC
        run: clojure -X:test
      - name: Test npm package script
        run: npm test
      - name: Coverage gate
        run: npm run coverage && npm run coverage:thresholds
      - name: Build GitHub Pages CLJS
        run: npm run build:pages
      - name: Check generated Pages artifacts
        run: git diff --exit-code -- docs/index.html docs/main.css docs/main.js
      - name: Install browser for e2e
        run: npx playwright install --with-deps chromium
      - name: Test browser editor
        run: npm run test:e2e
      - name: Smoke npm bin wrapper
        run: node bin/kotoba-slides.js
