name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test CLJC
        run: clojure -X:test
      - name: Test npm package script
        run: npm test
      - name: Build GitHub Pages CLJS
        run: npm run build:pages
      - name: Smoke npm bin wrapper
        run: node bin/kotoba-slides.js
